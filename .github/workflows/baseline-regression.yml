name: Baseline regression

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  baseline-regression:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install verifier dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install cryptography pynacl pydantic rich typer

      - name: Run baseline regression (checklist F)
        env:
          WOPS_ROOT: ${{ github.workspace }}
        run: bash tools/baseline-regression.sh